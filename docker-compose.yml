services:

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: tickplant_prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
    ports:
      - '9091:9090'          # Prometheus UI at http://localhost:9091
    # Allows containers to reach the Docker host via host.docker.internal.
    # Required on Linux (Docker Desktop handles this automatically on macOS/Windows).
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.2
    container_name: tickplant_grafana
    depends_on:
      - prometheus
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      # Open the TickPlant dashboard on login instead of the Grafana home page.
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/tickplant.json
    ports:
      - '3000:3000'          # Grafana UI at http://localhost:3000
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
